<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - AI Tools Directory</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header>
  <div class="container">
    <h1 class="logo">🤖 AI Tools Directory</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="page-content" style="padding: 80px 0; text-align: center; min-height: 60vh;">
  <div class="container">
    <h2 style="font-size: 42px; color: #f1f5f9; margin-bottom: 16px;">Contact Us</h2>
    <p style="font-size: 18px; color: #94a3b8; margin-bottom: 40px;">Have questions or suggestions? We'd love to hear from you!</p>
    
    <form style="max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; text-align: left;">
      <input type="text" placeholder="Your Name" required style="padding: 14px 18px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; font-size: 16px;">
      <input type="email" placeholder="Your Email" required style="padding: 14px 18px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; font-size: 16px;">
      <textarea placeholder="Your Message" rows="5" required style="padding: 14px 18px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; font-size: 16px; resize: vertical;"></textarea>
      <button type="submit" style="padding: 14px; border-radius: 10px; border: none; background: #3b82f6; color: #fff; font-size: 18px; font-weight: 600; cursor: pointer; transition: background 0.3s ease;">Send Message</button>
    </form>
  </div>
</section>

<footer style="background: #0f172a; padding: 30px 0; text-align: center; border-top: 1px solid #1e293b;">
  <div class="container">
    <p style="color: #64748b;">© 2026 AIForge. All Rights Reserved.</p>
  </div>
</footer>

</body>
</html>
